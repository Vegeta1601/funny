<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feel Better Soon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500&display=swap');

  :root {
    --night: #0F1B1E;
    --night-2: #142428;
    --amber: #E8A857;
    --cream: #F5E9D8;
    --rose: #D88C9A;
    --sage: #7C9885;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(ellipse at 50% 30%, var(--night-2) 0%, var(--night) 70%);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .stage {
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ambient floating dust */
  .motes {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .mote {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--amber);
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    10% { opacity: 0.5; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-110vh) translateX(20px); }
  }

  .card {
    position: relative;
    width: min(380px, 88vw);
    text-align: center;
    z-index: 2;
  }

  .glow {
    position: absolute;
    top: -40%;
    left: 50%;
    width: 480px;
    height: 480px;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(232,168,87,0.18) 0%, rgba(232,168,87,0) 65%);
    pointer-events: none;
    z-index: 0;
  }

  .scene {
    position: relative;
    height: 200px;
    margin-bottom: 8px;
  }

  /* steam */
  .steam {
    position: absolute;
    bottom: 108px;
    left: 50%;
    width: 60px;
    height: 110px;
    transform: translateX(-50%);
  }
  .wisp {
    position: absolute;
    bottom: 0;
    width: 10px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(to top, rgba(245,233,216,0.5), rgba(245,233,216,0));
    filter: blur(3px);
    animation: rise 3.2s ease-in infinite;
    opacity: 0;
  }
  .wisp:nth-child(1) { left: 6px; animation-delay: 0s; }
  .wisp:nth-child(2) { left: 24px; animation-delay: 1s; }
  .wisp:nth-child(3) { left: 42px; animation-delay: 2s; }

  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) scaleX(1); }
    20% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-90px) scaleX(1.8) translateX(10px); }
  }

  /* mug */
  .mug-wrap {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
  }
  .mug {
    width: 86px;
    height: 64px;
    background: linear-gradient(160deg, var(--rose), #b96d7c);
    border-radius: 8px 8px 16px 16px;
    position: relative;
    box-shadow: 0 8px 22px rgba(0,0,0,0.4);
    transition: transform 0.25s ease;
  }
  .mug-wrap:active .mug { transform: scale(0.96); }
  .mug::before {
    content: '';
    position: absolute;
    top: 6px;
    left: 8px;
    right: 8px;
    height: 10px;
    background: rgba(245,233,216,0.85);
    border-radius: 6px 6px 2px 2px;
  }
  .handle {
    position: absolute;
    right: -22px;
    top: 12px;
    width: 26px;
    height: 32px;
    border: 7px solid var(--rose);
    border-left: none;
    border-radius: 0 16px 16px 0;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 2rem;
    line-height: 1.15;
    color: var(--cream);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 10px;
    opacity: 0.9;
  }

  .message {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.05rem;
    color: rgba(245,233,216,0.0);
    max-width: 320px;
    margin: 14px auto 0;
    line-height: 1.55;
    transition: opacity 1.1s ease, transform 1.1s ease;
    opacity: 0;
    transform: translateY(8px);
  }
  .message.show {
    opacity: 1;
    transform: translateY(0);
    color: rgba(245,233,216,0.92);
  }

  .hint {
    margin-top: 26px;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: rgba(245,233,216,0.4);
    transition: opacity 0.6s ease;
  }
  .hint.hide { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    .wisp, .mote { animation: none; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="motes" id="motes"></div>

  <div class="card">
    <div class="glow"></div>
    <div class="scene">
      <div class="steam">
        <div class="wisp"></div>
        <div class="wisp"></div>
        <div class="wisp"></div>
      </div>
      <div class="mug-wrap" id="mugWrap">
        <div class="mug"><div class="handle"></div></div>
      </div>
    </div>

    <div class="eyebrow">a little warmth, sent your way</div>
    <h1>Feel better soon</h1>

    <p class="message" id="msg">
      Take a break, take care of yourself.<br>
      I am here whenever you need — or even don't need.<br>
      Remember that. 🌻
    </p>

    <div class="hint" id="hint">tap the mug</div>
  </div>
</div>

<script>
  const motesContainer = document.getElementById('motes');
  for (let i = 0; i < 18; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    m.style.left = Math.random() * 100 + '%';
    m.style.bottom = '-10px';
    m.style.animationDuration = (6 + Math.random() * 6) + 's';
    m.style.animationDelay = (Math.random() * 8) + 's';
    motesContainer.appendChild(m);
  }

  const mugWrap = document.getElementById('mugWrap');
  const msg = document.getElementById('msg');
  const hint = document.getElementById('hint');
  let revealed = false;

  mugWrap.addEventListener('click', () => {
    if (revealed) return;
    revealed = true;
    msg.classList.add('show');
    hint.classList.add('hide');
  });
</script>

</body>
</html>
